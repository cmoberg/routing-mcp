services:
  frr:
    build:
      context: .
      dockerfile: docker/Dockerfile.frr
    hostname: frr-test
    privileged: true
    volumes:
      - frr-run:/run/frr
      - ./docker/frr/daemons:/etc/frr/daemons:ro
      - ./docker/frr/frr.conf:/etc/frr/frr.conf:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/run/frr/mgmtd_fe.sock"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 8s

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "3000:3000"
    volumes:
      - frr-run:/run/frr
    depends_on:
      frr:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    volumes:
      - frr-run:/run/frr
      - .:/workspace
    working_dir: /workspace
    environment:
      - FRR_SOCK=/run/frr/mgmtd_fe.sock
    depends_on:
      frr:
        condition: service_healthy

volumes:
  frr-run:
